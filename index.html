<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>复古论坛</title>
<style>
body{background:#888;font-family:monospace;text-align:center;}
.box{border:3px solid #000;background:#ddd;margin:10px auto;padding:10px;width:700px}
button{padding:5px;margin:5px}
</style>
</head>

<body>

<div class="box">
<marquee id="marquee">这里写公告</marquee>
</div>

<div class="box">
<img id="img1" width="100%">
</div>

<div class="box">
<img id="img2" width="100%">
<br>
当前花数：<span id="flower">0</span>
<br>
<button onclick="flower()">献花</button>
</div>

<div class="box">
<input id="name" placeholder="名字">
<input id="msg" placeholder="留言">
<button onclick="send()">发送</button>
<div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const url = "https://nhgfnwdlqgtuhumgpvfo.supabase.co"
const key = "你的key"
const supabase = window.supabase.createClient(url,key)

async function load(){
let {data}=await supabase.from("site_stats").select("*").single()
document.getElementById("flower").innerText=data.flower_count

let {data:msg}=await supabase.from("messages").select("*")
let html=""
msg.forEach(m=>{
html+=m.name+"："+m.content+"<br>"
})
document.getElementById("list").innerHTML=html
}

async function flower(){
let n=parseInt(document.getElementById("flower").innerText)+1
await supabase.from("site_stats").update({flower_count:n}).eq("id",1)
load()
}

async function send(){
let name=document.getElementById("name").value
let msg=document.getElementById("msg").value
await supabase.from("messages").insert({name,content:msg})
load()
}

load()

</script>

</body>
</html>
