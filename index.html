<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>复古论坛联网版</title>
  <style>
    :root {
      --left-width: 640px;
      --right-width: 230px;
      --gap: 12px;
      --header-h: 70px;
      --main-h: 270px;
      --nav-h: 42px;
      --panel-border: 3px solid #111;
      --panel-bg: #d9d9d9;
      --page-bg: #8a8a8a;
      --text: #111;
      --accent: #7a0000;
      --btn-bg: #cfcfcf;
      --btn-hover: #e2e2e2;
      --input-bg: #efefef;
      --shadow: 4px 4px 0 #4c4c4c;
      --content-max: 1180px;
      --side-figure-width: 170px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "SimSun", "宋体", "Microsoft YaHei", serif;
      background-color: var(--page-bg);
      background-image:
        linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(0,0,0,0.05) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(0,0,0,0.05) 75%);
      background-size: 32px 32px;
      background-position: 0 0, 0 16px, 16px -16px, -16px 0;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .scene {
      width: min(var(--content-max), calc(100vw - 32px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--side-figure-width) 1fr var(--side-figure-width);
      gap: 20px;
      align-items: start;
      padding: 24px 0 32px;
    }

    .side-figure {
      min-height: 100vh;
      position: relative;
    }

    .side-figure-inner {
      position: sticky;
      top: 20px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: calc(100vh - 40px);
    }

    .figure-slot {
      width: 150px;
      height: 260px;
      border: 2px dashed rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      line-height: 1.6;
      font-size: 13px;
      overflow: hidden;
    }

    .figure-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .center-wrap {
      min-width: 0;
    }

    .top-space {
      width: calc(var(--left-width) + var(--right-width) + var(--gap));
      max-width: 100%;
      min-height: 86px;
      margin: 0 auto 14px;
      display: flex;
      align-items: flex-end;
    }

    .ip-placeholder {
      width: 260px;
      height: 70px;
      border: var(--panel-border);
      background: #e8e8e8;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      letter-spacing: 1px;
      overflow: hidden;
    }

    .ip-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .page {
      width: calc(var(--left-width) + var(--right-width) + var(--gap));
      max-width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--left-width) var(--right-width);
      grid-template-areas:
        "banner banner"
        "hero flower"
        "nav flower"
        "board profile";
      gap: var(--gap);
      align-items: start;
    }

    .panel,
    .nav {
      background: var(--panel-bg);
      border: var(--panel-border);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .banner { grid-area: banner; height: var(--header-h); }
    .hero { grid-area: hero; height: var(--main-h); }
    .flower { grid-area: flower; height: calc(var(--main-h) + var(--nav-h) + var(--gap)); }
    .nav { grid-area: nav; height: var(--nav-h); }
    .board { grid-area: board; height: 900px; overflow-y: auto; }
    .profile { grid-area: profile; height: 900px; overflow-y: auto; }

    .banner-track {
      position: relative;
      height: 100%;
      overflow: hidden;
      background: #e5e5e5;
    }

    .banner-text {
      position: absolute;
      white-space: nowrap;
      top: 50%;
      transform: translateY(-50%);
      font-weight: bold;
      font-size: 24px;
      animation: marquee 14s linear infinite;
      padding-left: 100%;
    }

    @keyframes marquee {
      0% { transform: translate(0, -50%); }
      100% { transform: translate(-180%, -50%); }
    }

    .image-wrap {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ececec;
      overflow: hidden;
    }

    .image-wrap img,
    .flower-preview img,
    .avatar-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .placeholder {
      width: 88%;
      height: 80%;
      border: 2px dashed #666;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      color: #444;
      background: rgba(255,255,255,0.35);
      line-height: 1.6;
      font-size: 13px;
    }

    .flower-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
    }

    .flower-preview {
      flex: 1;
      min-height: 0;
      border: 2px inset #bbb;
      background: #eaeaea;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .flower-count {
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
    }

    .retro-btn {
      border: 2px outset #fff;
      background: var(--btn-bg);
      padding: 6px 10px;
      cursor: pointer;
      min-height: 32px;
    }

    .retro-btn:hover { background: var(--btn-hover); }
    .retro-btn:active { border-style: inset; }
    .retro-btn:disabled {
      cursor: not-allowed;
      color: #666;
      background: #c7c7c7;
    }

    .nav-tabs {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .tab-btn {
      border: 0;
      border-right: 2px solid #333;
      background: linear-gradient(#ededed, #cfcfcf);
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }

    .tab-btn:last-child { border-right: 0; }
    .tab-btn.active {
      background: linear-gradient(#ffffff, #dfdfdf);
      color: var(--accent);
    }

    .board-inner,
    .profile-inner {
      padding: 12px;
    }

    .welcome-box,
    .message-lock,
    .message-card,
    .profile-card,
    .profile-note,
    .network-box {
      border: 2px solid #444;
      background: #efefef;
      padding: 10px;
      margin-bottom: 12px;
    }

    .welcome-box {
      line-height: 1.8;
      background: #e9e9e9;
    }

    .message-form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 2px dashed #666;
    }

    .message-input,
    .login-form input {
      flex: 1;
      min-width: 0;
      border: 2px inset #fff;
      background: var(--input-bg);
      padding: 8px;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: #444;
      margin-bottom: 6px;
      border-bottom: 1px dotted #666;
      padding-bottom: 4px;
    }

    .profile-card {
      padding: 12px;
      margin-bottom: 14px;
    }

    .avatar-box {
      width: 110px;
      height: 110px;
      margin: 0 auto 10px;
      border: 2px solid #333;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .name-box {
      text-align: center;
      font-weight: bold;
      min-height: 24px;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status-line {
      font-size: 12px;
      color: #333;
      margin-top: 8px;
      line-height: 1.6;
      word-break: break-word;
    }

    .profile-note,
    .network-box {
      font-size: 12px;
      line-height: 1.7;
    }

    .network-box code {
      background: #ddd;
      padding: 1px 4px;
    }

    @media (max-width: 1220px) {
      .scene {
        grid-template-columns: 1fr;
        gap: 14px;
        width: min(96vw, 920px);
      }

      .side-figure {
        min-height: auto;
      }

      .side-figure-inner {
        position: static;
        min-height: auto;
      }

      .figure-slot {
        width: 100%;
        height: 120px;
      }
    }

    @media (max-width: 980px) {
      :root {
        --left-width: min(94vw, 640px);
        --right-width: min(94vw, 230px);
      }

      .top-space,
      .page {
        width: 100%;
      }

      .page {
        grid-template-columns: 1fr;
        grid-template-areas:
          "banner"
          "hero"
          "flower"
          "nav"
          "board"
          "profile";
      }

      .flower,
      .profile,
      .board,
      .hero,
      .banner,
      .nav {
        width: 100%;
      }

      .flower { height: 420px; }
      .board,
      .profile { height: auto; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <aside class="side-figure side-figure-left">
      <div class="side-figure-inner">
        <div class="figure-slot" id="leftFigureSlot">左侧背景人物预留位</div>
      </div>
    </aside>

    <div class="center-wrap">
      <div class="top-space">
        <div class="ip-placeholder" id="ipSlot">顶部左侧 IP 图片预留区</div>
      </div>

      <main class="page">
        <section class="panel banner" id="block1">
          <div class="banner-track">
            <div class="banner-text" id="marqueeText">【公告内容待填写】&nbsp;&nbsp;&nbsp;【公告内容待填写】&nbsp;&nbsp;&nbsp;【公告内容待填写】</div>
          </div>
        </section>

        <section class="panel hero" id="block2">
          <div class="image-wrap" id="randomImageA"></div>
        </section>

        <section class="panel flower" id="block3">
          <div class="flower-body">
            <div class="flower-preview" id="randomImageB"></div>
            <div class="flower-count">
              目前花朵：<span id="flowerCount">0</span><br />
              <button class="retro-btn" id="flowerBtn">献花</button>
            </div>
          </div>
        </section>

        <nav class="nav" id="block5">
          <div class="nav-tabs">
            <button class="tab-btn active" type="button">留言板</button>
            <button class="tab-btn" type="button">新闻咨询</button>
            <button class="tab-btn" type="button">处刑人信息</button>
            <button class="tab-btn" type="button">沉痛哀悼</button>
          </div>
        </nav>

        <section class="panel board" id="block6">
          <div class="board-inner">
            <div class="welcome-box">这里是留言板区域。未登录时可以浏览，登录后可以联网发表留言。</div>

            <div class="message-lock" id="messageLock">正在检查登录状态……</div>

            <form class="message-form" id="messageForm">
              <input class="message-input" id="messageInput" type="text" maxlength="200" placeholder="请输入留言内容（需先登录）" />
              <button class="retro-btn" type="submit" id="sendBtn">发表</button>
            </form>

            <div class="messages" id="messageList"></div>
          </div>
        </section>

        <aside class="panel profile" id="block4">
          <div class="profile-inner">
            <div class="profile-card">
              <div class="avatar-box" id="avatarBox">未登录</div>
              <div class="name-box" id="displayName">等待输入</div>
              <form class="login-form" id="loginForm">
                <input type="text" id="nameInput" maxlength="24" placeholder="输入姓名" />
                <input type="text" id="avatarInput" placeholder="输入头像图片地址（可留空）" />
                <button class="retro-btn" type="submit" id="loginBtn">登录</button>
                <button class="retro-btn" type="button" id="logoutBtn">退出</button>
              </form>
              <div class="status-line" id="loginStatus">未连接</div>
            </div>

            <div class="profile-note">这里显示访客头像与姓名。输入姓名即可进入可留言状态。</div>
            <div class="network-box">联网模板使用 Supabase 保存献花与留言。</div>
          </div>
        </aside>
      </main>
    </div>

    <aside class="side-figure side-figure-right">
      <div class="side-figure-inner">
        <div class="figure-slot" id="rightFigureSlot">右侧背景人物预留位</div>
      </div>
    </aside>
  </div>

  <script type="module">
    import { SITE_CONFIG, SUPABASE_SQL, createSupabaseClient, hasSupabaseConfig } from './config.js';

    const $ = (id) => document.getElementById(id);
    const LOCAL_USER_KEY = 'retro_forum_online_user';

    function randomPick(arr) {
      if (!Array.isArray(arr) || arr.length === 0) return '';
      const valid = arr.filter(Boolean);
      if (valid.length === 0) return '';
      return valid[Math.floor(Math.random() * valid.length)];
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderImage(containerId, src, fallbackText) {
      const box = $(containerId);
      if (!src) {
        box.innerHTML = `<div class="placeholder">${fallbackText}<br>（图片地址待填写）</div>`;
        return;
      }
      box.innerHTML = `<img src="${src}" alt="图片">`;
    }

    function renderSimpleSlot(containerId, src, fallbackText) {
      const box = $(containerId);
      if (!src) {
        box.textContent = fallbackText;
        return;
      }
      box.innerHTML = `<img src="${src}" alt="${escapeHtml(fallbackText)}">`;
    }

    function setStatus(text) {
      $('loginStatus').textContent = text;
    }

    function getCurrentUser() {
      const raw = localStorage.getItem(LOCAL_USER_KEY);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }

    function setCurrentUser(user) {
      if (!user) {
        localStorage.removeItem(LOCAL_USER_KEY);
        return;
      }
      localStorage.setItem(LOCAL_USER_KEY, JSON.stringify(user));
    }

    function renderUser() {
      const user = getCurrentUser();
      const avatarBox = $('avatarBox');
      const displayName = $('displayName');
      const messageInput = $('messageInput');
      const sendBtn = $('sendBtn');
      const lock = $('messageLock');

      if (!user) {
        avatarBox.innerHTML = '未登录';
        displayName.textContent = '等待输入';
        messageInput.disabled = true;
        sendBtn.disabled = true;
        lock.textContent = '未登录时只能浏览留言，登录后可发布新留言。';
        return;
      }

      avatarBox.innerHTML = user.avatar
        ? `<img src="${escapeHtml(user.avatar)}" alt="用户头像">`
        : '<span>无头像</span>';
      displayName.textContent = user.name || '匿名用户';
      messageInput.disabled = false;
      sendBtn.disabled = false;
      lock.textContent = `当前登录：${user.name}，可以发布留言。`;
    }

    function initStaticContent() {
      $('marqueeText').innerHTML =
        `${escapeHtml(SITE_CONFIG.marqueeContent)}&nbsp;&nbsp;&nbsp;${escapeHtml(SITE_CONFIG.marqueeContent)}`;

      renderImage('randomImageA', randomPick(SITE_CONFIG.block2Images), '板块2 随机图占位');
      renderImage('randomImageB', randomPick(SITE_CONFIG.block3Images), '板块3 随机图占位');
      renderSimpleSlot('leftFigureSlot', SITE_CONFIG.leftFigureImage, '左侧背景人物预留位');
      renderSimpleSlot('rightFigureSlot', SITE_CONFIG.rightFigureImage, '右侧背景人物预留位');
      renderSimpleSlot('ipSlot', SITE_CONFIG.topIpImage, '顶部左侧 IP 图片预留区');
    }

    const supabase = hasSupabaseConfig() ? createSupabaseClient() : null;

    async function loadFlowerCount() {
      if (!supabase) {
        $('flowerCount').textContent = '0';
        return;
      }

      const { data, error } = await supabase
        .from('site_stats')
        .select('flower_count')
        .eq('id', 1)
        .single();

      if (error) {
        console.error(error);
        $('flowerCount').textContent = '0';
        return;
      }

      $('flowerCount').textContent = data?.flower_count ?? 0;
    }

    async function incrementFlower() {
      if (!supabase) {
        alert('请先在 config.js 里填写 Supabase 配置。');
        return;
      }

      const btn = $('flowerBtn');
      btn.disabled = true;

      const current = Number($('flowerCount').textContent || 0);
      const next = current + 1;

      const { error } = await supabase
        .from('site_stats')
        .update({ flower_count: next, updated_at: new Date().toISOString() })
        .eq('id', 1);

      if (error) {
        console.error(error);
        alert('献花失败。请检查 Supabase 设置。');
      } else {
        $('flowerCount').textContent = String(next);
      }

      btn.disabled = false;
    }

    async function loadMessages() {
      const wrap = $('messageList');

      if (!supabase) {
        wrap.innerHTML = '<div class="message-card">请先在 config.js 里填写 Supabase 配置。</div>';
        return;
      }

      wrap.innerHTML = '<div class="message-card">留言加载中……</div>';

      const { data, error } = await supabase
        .from('messages')
        .select('name, avatar, content, created_at')
        .order('created_at', { ascending: false })
        .limit(100);

      if (error) {
        console.error(error);
        wrap.innerHTML = '<div class="message-card">留言加载失败。请检查 Supabase 设置。</div>';
        return;
      }

      if (!data || data.length === 0) {
        wrap.innerHTML = '<div class="message-card">暂无留言。</div>';
        return;
      }

      wrap.innerHTML = data.map(item => `
        <div class="message-card">
          <div class="message-meta">
            <span>${escapeHtml(item.name || '匿名')}</span>
            <span>${escapeHtml(new Date(item.created_at).toLocaleString('zh-CN', { hour12: false }))}</span>
          </div>
          <div>${escapeHtml(item.content || '')}</div>
        </div>
      `).join('');
    }

    async function postMessage(text) {
      const user = getCurrentUser();
      if (!user) {
        alert('请先登录后再留言。');
        return false;
      }
      if (!supabase) {
        alert('请先在 config.js 里填写 Supabase 配置。');
        return false;
      }

      const { error } = await supabase
        .from('messages')
        .insert({
          name: user.name,
          avatar: user.avatar || null,
          content: text
        });

      if (error) {
        console.error(error);
        alert('留言失败。请检查 Supabase 设置。');
        return false;
      }

      return true;
    }

    function bindEvents() {
      $('flowerBtn').addEventListener('click', incrementFlower);

      $('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = $('nameInput').value.trim();
        const avatar = $('avatarInput').value.trim();
        if (!name) {
          alert('请先输入姓名。');
          return;
        }
        setCurrentUser({ name, avatar });
        renderUser();
        setStatus(supabase ? '已连接 Supabase' : '还没填写 Supabase 配置');
        $('nameInput').value = '';
        $('avatarInput').value = '';
      });

      $('logoutBtn').addEventListener('click', () => {
        setCurrentUser(null);
        renderUser();
      });

      $('messageForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = $('messageInput');
        const text = input.value.trim();
        if (!text) return;

        $('sendBtn').disabled = true;
        const ok = await postMessage(text);
        $('sendBtn').disabled = false;

        if (ok) {
          input.value = '';
          await loadMessages();
        }
      });
    }

    async function initNetwork() {
      if (!supabase) {
        setStatus('还没填写 Supabase 配置');
        $('messageLock').textContent = '当前已经是联网模板，但你还没有填写 config.js 里的 Supabase 信息。';
        $('messageInput').disabled = true;
        $('sendBtn').disabled = true;
        await loadMessages();
        return;
      }

      setStatus('已连接 Supabase');
      await loadFlowerCount();
      await loadMessages();

      supabase
        .channel('retro-forum-live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, async () => {
          await loadMessages();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'site_stats' }, async () => {
          await loadFlowerCount();
        })
        .subscribe();
    }

    console.log('请把 README.md 里的 SQL 复制到 Supabase。');
    console.log(SUPABASE_SQL);

    initStaticContent();
    renderUser();
    bindEvents();
    initNetwork();
  </script>
</body>
</html>
