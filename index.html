<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>复古论坛</title>
<style>
body{background:#888;font-family:monospace;text-align:center;}
.box{border:3px solid #000;background:#ddd;margin:10px auto;padding:10px;width:700px}
button{padding:5px;margin:5px}
</style>
</head>

<body>

<div class="box">
<marquee id="marquee">这里写公告</marquee>
</div>

<div class="box">
<img id="img1" width="100%">
</div>

<div class="box">
<img id="img2" width="100%">
<br>
当前花数：<span id="flower">0</span>
<br>
<button onclick="flower()">献花</button>
</div>

<div class="box">
<input id="name" placeholder="名字">
<input id="msg" placeholder="留言">
<button onclick="send()">发送</button>
<div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
<script>
const url = "https://nhgfnwdlqgtuhumgpvfo.supabase.co";
const key = "sb_publishable_LvuAMG5Z_wkmgyE8m7hmHA_q4-4ai4S";
const client = window.supabase.createClient(url, key);

async function load() {
  const { data, error } = await client
    .from("site_stats")
    .select("*")
    .eq("id", 1)
    .single();

  if (error) {
    console.log("读取花数失败：", error);
  } else {
    document.getElementById("flower").innerText = data.flower_count;
  }

  const { data: msg, error: msgError } = await client
    .from("messages")
    .select("*")
    .order("created_at", { ascending: false });

  if (msgError) {
    console.log("读取留言失败：", msgError);
    return;
  }

  let html = "";
  msg.forEach(m => {
    html += (m.name || "匿名") + "：" + (m.content || "") + "<br>";
  });
  document.getElementById("list").innerHTML = html;
}

async function flower() {
  const { error } = await client.rpc("increment_flower");
  if (error) {
    console.log("献花失败：", error);
    alert("献花失败");
    return;
  }
  load();
}

async function send() {
  const name = document.getElementById("name").value.trim();
  const msg = document.getElementById("msg").value.trim();

  if (!name) {
    alert("请先输入名字");
    return;
  }

  if (!msg) {
    alert("请先输入留言");
    return;
  }

  const { error } = await client
    .from("messages")
    .insert({ name: name, content: msg });

  if (error) {
    console.log("留言失败：", error);
    alert("留言失败");
    return;
  }

  document.getElementById("msg").value = "";
  load();
}

load();
</script>
  

</body>
</html>
